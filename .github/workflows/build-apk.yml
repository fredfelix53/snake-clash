name: Build APK

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync game files to Android assets
        run: |
          mkdir -p android/app/src/main/assets/game
          cp -r game/* android/app/src/main/assets/game/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        working-directory: ./android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-clash-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Verify APK
        run: |
          APK=$(ls android/app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "✅ APK built: $APK"
            ls -lh "$APK"
          else
            echo "⚠️ No APK found, checking all outputs..."
            find android -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          fi
